<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blynk Modern Control Dashboard</title>
    <link rel="stylesheet" href="Css/style2.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="dashboard-body">

    <div class="container">
        <header>
            <h1>BLYNK IoT CONTROL</h1>
            <p>HTTP API Real-time Monitoring</p>
        </header>

        <main class="bento-grid">
            <!-- 1. ปุ่มเปิด/ปิด (Control) -->
            <section class="card control-card">
                <h3>ปุ่มเปิด/ปิด (V0)</h3>
                <label class="switch-container">
                    <input type="checkbox" id="btnToggle" onchange="updateButton(this.checked)">
                    <span class="slider-round"></span>
                </label>
                <p id="btnStatus">สถานะ: OFF</p>
            </section>

            <!-- 2. ปรับค่า (Control) -->
            <section class="card slider-card">
                <h3>ปรับค่า (V2)</h3>
                <input type="range" id="valSlider" min="0" max="255" value="0" oninput="updateSlider(this.value)">
                <div class="val-display"><span id="sliderVal">0</span> / 255</div>
            </section>

            <!-- 3. สถานะการทำงาน (Display LED) -->
            <section class="card led-card">
                <h3>สถานะการทำงาน (V1)</h3>
                <div id="ledIndicator" class="led-dot"></div>
                <p id="ledText">ระบบหยุดนิ่ง</p>
            </section>

            <!-- 4. ค่าอุณหภูมิ (Display Gauge) -->
            <section class="card gauge-card">
                <h3>ค่าอุณหภูมิ (V3)</h3>
                <div class="gauge-wrapper">
                    <svg viewBox="0 0 100 100" class="gauge-svg">
                        <circle class="gauge-bg" cx="50" cy="50" r="45"></circle>
                        <circle id="gaugeProgress" class="gauge-progress" cx="50" cy="50" r="45"></circle>
                    </svg>
                    <div id="gaugeVal" class="gauge-inner-text">0°C</div>
                </div>
            </section>

            <!-- 5. การตอบกลับ (Display Label) -->
            <section class="card label-card">
                <h3>การตอบกลับ (V4)</h3>
                <div class="label-box">
                    <p id="responseLabel">รอการตอบกลับ...</p>
                </div>
            </section>
        </main>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
