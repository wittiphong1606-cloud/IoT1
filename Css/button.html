<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link rel="preconnect" href="https://fonts.gstatic.com/">
    <link href="https://fonts.googleapis.com/css2?family=Bungee+Spice&family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@300&family=Oswald:wght@700&family=Poppins:wght@300;400;500;600;700&family=Press+Start+2P&family=Righteous&family=Roboto+Mono:wght@400;500;700&family=Shadows+Into+Light&family=Tiro+Devanagari+Hindi&family=Varela+Round&display=swap" 
        rel="stylesheet">
    <title>CSS Button</title>
    <style>
        .btn1{
            background-image: linear-gradient(to top, white,aqua,black);
            border: 1px solid rgb(22, 22, 22);
            color: white;
            padding-left: 3px;
            padding-right: 3px;
            padding-top: 10px;
            padding-bottom: 10px;
            border-radius: 2%;
            text-shadow: 1px 1px 2px black;
            margin-left: 50px;
            margin-right: 50px;
            margin-top: 100px;
            margin-bottom: 100px;
            box-shadow: 10px 10px 10px black;
            
        }
        .txt{
           padding-top: 3px;
           padding-bottom: 3px;
           border-color: rgb(0, 0, 255);
           border-width: 3px;
           border-style: solid;
           border-radius: 5px;
            
        }
        
    </style>
</head>
<body>
    <button class="btn1">Button กด 1 ครั้ง</button>
    <input type="button" class="btn2" value="Button 2">

    <input type="text" class="txt">
</body>
</html>
